<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Denis Daragan Design</title>
    <script>
      (function routeGitHubPagesFallback(location) {
        if (!location.search.startsWith('?/')) {
          return;
        }

        const decoded = location.search
          .slice(2)
          .split('&')
          .map((segment, index) => (index === 0 ? segment : `?${segment}`).replace(/~and~/g, '&'))
          .join('');

        window.history.replaceState(null, '', `${location.pathname}${decoded}${location.hash}`);
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
